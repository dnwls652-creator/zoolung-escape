<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>미어캣 미션 — 주렁주렁 숲 숨겨진 보물</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --dark-brown:#3A2214; --wood-brown:#5A321B;
  --jungle-green:#2F5D34; --leaf-green:#5F8B3D;
  --gold:#D8A637; --gold-light:#F0C050;
  --orange:#F89C2A; --cream:#F6E2B3;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--dark-brown);min-height:100vh;display:flex;flex-direction:column;font-family:'Noto Sans KR',sans-serif;max-width:420px;margin:0 auto;overflow-x:hidden}

/* 반딧불 */
.firefly-container{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.firefly{position:absolute;width:4px;height:4px;border-radius:50%;background:var(--gold-light);box-shadow:0 0 6px 2px rgba(240,192,80,0.7);animation:flyFloat linear infinite;opacity:0}
@keyframes flyFloat{0%{opacity:0;transform:translateY(0) scale(0.5)}15%{opacity:1}85%{opacity:0.8}100%{opacity:0;transform:translateY(-120vh) translateX(30px) scale(1.2)}}

/* 상단 HUD */
.top-hud{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,#2A1608,var(--wood-brown));border-bottom:3px solid var(--gold);box-shadow:0 4px 20px rgba(0,0,0,0.5);padding:11px 16px 10px}
.hud-inner{display:flex;align-items:center;justify-content:space-between}
.hud-left{display:flex;align-items:center;gap:10px}
.hud-icon{width:36px;height:36px;object-fit:contain;filter:drop-shadow(0 0 6px rgba(240,192,80,0.5))}
.hud-text .hud-title{font-weight:900;font-size:16px;color:var(--gold-light);text-shadow:0 0 12px rgba(240,192,80,0.6),2px 2px 0 rgba(0,0,0,0.5)}
.hud-text .hud-sub{font-size:10px;color:rgba(246,226,179,0.6);margin-top:2px}

/* 진행 토큰 — 황금별/반딧불 */
.progress-tokens{display:flex;gap:4px;align-items:center}
.token{width:22px;height:22px;opacity:0.35;transition:all 0.4s;filter:grayscale(1)}
.token img{width:100%;height:100%;object-fit:contain}
.token.done{opacity:1;filter:grayscale(0) drop-shadow(0 0 5px rgba(240,192,80,0.8));animation:tokenPop 0.4s cubic-bezier(.34,1.56,.64,1)}
.token.active{opacity:1;filter:grayscale(0) drop-shadow(0 0 8px rgba(248,156,42,1));animation:tokenPulse 1.5s ease-in-out infinite}
@keyframes tokenPop{0%{transform:scale(0)}100%{transform:scale(1)}}
@keyframes tokenPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}

/* 벽 씬 */
.wall-scene{flex:1;position:relative;overflow:hidden;min-height:400px;z-index:1}
.wall-photo{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;filter:brightness(0.78) saturate(1.1)}
.wall-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(20,10,5,0.25) 0%,rgba(10,25,12,0.08) 40%,rgba(20,10,5,0.35) 100%);pointer-events:none;z-index:1}

/* 마커 */
.marker{position:absolute;width:68px;height:68px;border-radius:12px;border:2px dashed rgba(216,166,55,0.3);display:flex;align-items:center;justify-content:center;overflow:hidden;transition:all 0.4s ease;background:rgba(20,10,5,0.25);z-index:2}
.marker img{width:92%;height:92%;object-fit:contain;opacity:0.38;filter:brightness(0.55) saturate(0.4);transition:all 0.4s ease}
.marker.glow{border:2px solid var(--gold);background:rgba(216,166,55,0.12);box-shadow:0 0 0 3px rgba(216,166,55,0.2),0 0 16px rgba(216,166,55,0.6),0 0 36px rgba(216,166,55,0.3);animation:markerGlow 1.4s ease-in-out infinite;z-index:5;width:76px;height:76px}
.marker.glow img{opacity:1;filter:brightness(1.9) saturate(2.0) contrast(1.2) drop-shadow(0 0 4px rgba(240,192,80,0.6));width:100%;height:100%}
@keyframes markerGlow{0%,100%{box-shadow:0 0 0 3px rgba(216,166,55,0.2),0 0 16px rgba(216,166,55,0.6),0 0 36px rgba(216,166,55,0.3)}50%{box-shadow:0 0 0 5px rgba(216,166,55,0.3),0 0 28px rgba(248,156,42,0.85),0 0 56px rgba(248,156,42,0.4)}}

/* 미어캣 */
.meerkat-char{position:absolute;left:-8px;bottom:-8px;width:195px;z-index:4;animation:breathe 4s ease-in-out infinite;transform-origin:bottom left;filter:drop-shadow(2px 4px 8px rgba(0,0,0,0.5))}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.025)}}

/* 양피지 말풍선 */



/* 하단 패널 */
.bottom-panel{background:linear-gradient(180deg,#2A1608,var(--dark-brown));border-top:3px solid var(--gold);box-shadow:0 -6px 24px rgba(0,0,0,0.6);padding:13px 16px 18px;z-index:10}

/* 슬롯 라벨 */
.slot-label{display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:10px}
.slot-label-icon{width:22px;height:22px;object-fit:contain;filter:drop-shadow(0 0 4px rgba(216,166,55,0.6))}
.slot-label-text{font-size:11px;font-weight:700;color:rgba(246,226,179,0.65);letter-spacing:1px}

/* 슬롯 */
.slots-row{display:flex;gap:5px;justify-content:center;align-items:center;margin-bottom:13px}
.slot{width:44px;height:44px;border-radius:10px;background:linear-gradient(145deg,#2A1608,#3A2214);border:2px solid rgba(216,166,55,0.45);display:flex;align-items:center;justify-content:center;overflow:hidden;transition:all 0.4s cubic-bezier(.34,1.56,.64,1);box-shadow:inset 0 2px 4px rgba(0,0,0,0.5),0 2px 6px rgba(0,0,0,0.4);position:relative}
/* 빈 슬롯에 보물상자 아이콘 */
.slot-empty-icon{position:absolute;width:65%;height:65%;object-fit:contain;opacity:0.18;filter:grayscale(0.3)}
.slot img.piece-img{width:82%;height:82%;object-fit:contain;opacity:0;transform:scale(0.4) rotate(-5deg);transition:all 0.5s cubic-bezier(.34,1.56,.64,1);filter:brightness(1.6) saturate(1.8);position:relative;z-index:1}
.slot.filled{border-color:var(--gold-light);background:linear-gradient(145deg,#4A2A0A,#6A3A14);box-shadow:inset 0 2px 4px rgba(0,0,0,0.3),0 0 12px rgba(216,166,55,0.55),0 0 24px rgba(216,166,55,0.25);animation:slotPop 0.5s cubic-bezier(.34,1.56,.64,1)}
.slot.filled img.piece-img{opacity:1;transform:scale(1) rotate(0deg)}
.slot.filled .slot-empty-icon{opacity:0}
@keyframes slotPop{0%{transform:scale(0.85)}60%{transform:scale(1.12)}100%{transform:scale(1)}}

/* 보석 구분자 */
.gem-sep{width:10px;height:10px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#ffe066,var(--gold),#A07020);box-shadow:0 0 6px rgba(216,166,55,0.7);flex-shrink:0;margin:0 3px}

/* 힌트 버튼 */
.hint-btn{width:100%;background:linear-gradient(180deg,#F0B030 0%,var(--orange) 50%,#C47010 100%);color:var(--dark-brown);border:none;border-radius:16px;padding:13px 16px;font-size:15px;font-weight:900;font-family:'Noto Sans KR',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 0 #8B5010,0 6px 16px rgba(248,156,42,0.4),inset 0 1px 0 rgba(255,255,255,0.4);transition:all 0.15s ease;position:relative;overflow:hidden}
.hint-btn-icon{width:28px;height:28px;object-fit:contain;flex-shrink:0}
.hint-btn::before{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);animation:btnShine 3s ease-in-out infinite}
@keyframes btnShine{0%{left:-100%}40%{left:150%}100%{left:150%}}
.hint-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #8B5010,0 3px 8px rgba(248,156,42,0.3)}
.hint-btn.done{background:linear-gradient(180deg,#5FA050,var(--jungle-green));box-shadow:0 4px 0 #1A3A20,0 6px 16px rgba(47,93,52,0.4);color:#C8F0C0}
.hint-btn:disabled{opacity:0.55;cursor:default;transform:none}

/* 클리어 */
.clear-screen{display:none;position:fixed;inset:0;background:radial-gradient(ellipse at center,#2A1608,#1A0E05);flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:32px;z-index:100}
.clear-screen.show{display:flex;animation:clearIn 0.5s ease}
@keyframes clearIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
.clear-chest{width:110px;height:110px;object-fit:contain;animation:chestBounce 0.8s cubic-bezier(.34,1.56,.64,1) 0.2s both;filter:drop-shadow(0 0 20px rgba(248,156,42,0.6))}
@keyframes chestBounce{from{transform:scale(0) rotate(-15deg)}to{transform:scale(1) rotate(0)}}
.clear-title{font-size:26px;font-weight:900;color:var(--gold-light);text-shadow:0 0 20px rgba(240,192,80,0.7),2px 2px 0 rgba(0,0,0,0.5)}
.clear-sub{font-size:13px;color:rgba(246,226,179,0.7);margin-top:-8px}
.clear-word-row{display:flex;gap:4px;align-items:center;background:linear-gradient(145deg,#3A2214,#2A1608);border:2px solid var(--gold);border-radius:16px;padding:12px 18px;flex-wrap:wrap;justify-content:center;box-shadow:0 0 20px rgba(216,166,55,0.3)}
.clear-word-row img{width:42px;height:42px;object-fit:contain;filter:brightness(1.6) saturate(1.8)}
.clear-gem{width:8px;height:8px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#ffe066,var(--gold));box-shadow:0 0 8px rgba(216,166,55,0.8);margin:0 4px}
.clear-text{font-size:14px;color:rgba(246,226,179,0.85);line-height:1.85;font-weight:500}
.clear-next-btn{background:linear-gradient(180deg,#F0B030,var(--orange));color:var(--dark-brown);border:none;border-radius:16px;padding:14px 36px;font-size:16px;font-weight:900;cursor:pointer;box-shadow:0 4px 0 #8B5010,0 8px 20px rgba(248,156,42,0.4);transition:all 0.15s;font-family:'Noto Sans KR',sans-serif}
.clear-next-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #8B5010}
</style>
</head>

// 진행 토큰 — 황금별
['tok1','tok2','tok3','tok4','tok5'].forEach(id => {
  document.getElementById(id).src = ICONS.ICO_13;
});
// 빈 슬롯 아이콘 — 보물상자잠김
for(let i=1;i<=8;i++) {
  const el = document.getElementById('empty'+i);
  if(el) el.src = ICONS.ICO_2;
}

// 반딧불
(function(){
  const c = document.getElementById('fireflies');
  for(let i=0;i<18;i++){
    const f=document.createElement('div');
    f.className='firefly';
    f.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${2+Math.random()*3}px;height:${2+Math.random()*3}px;animation-duration:${6+Math.random()*10}s;animation-delay:${Math.random()*8}s`;
    c.appendChild(f);
  }
})();

const reveals = [
  {w:'w1',s:'s1',d:600},{w:'w2',s:'s2',d:1400},{w:'w3',s:'s3',d:2200},
  {w:'w4',s:'s4',d:3200},{w:'w5',s:'s5',d:4000},
  {w:'w6',s:'s6',d:5000},{w:'w7',s:'s7',d:5800},{w:'w8',s:'s8',d:6600},
];

let started = false;
function startReveal() {
  if(started) return;
  started = true;
  const btn = document.getElementById('mainBtn');
  btn.disabled = true;
  btn.childNodes[2].textContent = ' 글자를 찾는 중...';

  reveals.forEach(r => {
    setTimeout(() => {
      document.getElementById(r.w).classList.add('glow');
      setTimeout(() => document.getElementById(r.s).classList.add('filled'), 480);
    }, r.d);
  });
  setTimeout(() => {
    btn.disabled = false;
    btn.innerHTML = `<img class="hint-btn-icon" src="${ICONS.ICO_8}" alt="열쇠"> ✅ 정답 확인하기`;
    btn.classList.add('done');
    btn.onclick = () => document.getElementById('clearScreen').classList.add('show');
  }, 7600);
}
</script>
