<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>미어캣 미션 — 주렁주렁 숲 숨겨진 보물</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#C8920A;min-height:100vh;display:flex;flex-direction:column;font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;max-width:420px;margin:0 auto}
.top-bar{background:#5C3D1E;padding:12px 18px 10px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;border-bottom:3px solid #8B6914}
.top-title{color:#FFD700;font-size:14px;font-weight:500;display:flex;align-items:center;gap:6px}
.top-sub{color:rgba(255,215,0,0.6);font-size:10px;margin-top:2px}
.steps{display:flex;gap:5px}
.sdot{width:22px;height:6px;border-radius:3px;background:rgba(255,215,0,0.2)}
.sdot.done{background:#4CAF82}
.sdot.active{background:#FFD700}

.wall-scene{flex:1;position:relative;overflow:hidden;min-height:400px}
.wall-photo{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;filter:brightness(0.75)}

.marker{position:absolute;width:70px;height:70px;border-radius:10px;border:2px dashed rgba(255,215,0,0.4);display:flex;align-items:center;justify-content:center;overflow:hidden;transition:all 0.4s ease;background:rgba(0,0,0,0.15)}
.marker img{width:90%;height:90%;object-fit:contain;opacity:0.5;filter:brightness(0.7) saturate(0.6);transition:all 0.4s ease}
.marker.glow{border:2px solid #FFD700;background:rgba(255,215,0,0.15);box-shadow:0 0 0 4px rgba(255,215,0,0.25),0 0 20px rgba(255,215,0,0.5),0 0 40px rgba(255,215,0,0.25);animation:markerGlow 1.3s ease-in-out infinite;z-index:5}
.marker.glow img{opacity:1;filter:brightness(1.5) saturate(1.8)}
@keyframes markerGlow{0%,100%{box-shadow:0 0 0 4px rgba(255,215,0,0.25),0 0 20px rgba(255,215,0,0.5),0 0 40px rgba(255,215,0,0.25)}50%{box-shadow:0 0 0 6px rgba(255,215,0,0.35),0 0 32px rgba(255,215,0,0.7),0 0 60px rgba(255,215,0,0.35)}}
.marker .badge{position:absolute;top:-8px;left:-8px;width:22px;height:22px;background:#FFD700;color:#5C3D1E;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.3s;z-index:6;box-shadow:0 1px 4px rgba(0,0,0,0.3)}
.marker.glow .badge{opacity:1}

.meerkat-char{position:absolute;left:-8px;bottom:-8px;width:200px;z-index:4;animation:breathe 4s ease-in-out infinite;transform-origin:bottom left}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}
.bubble{position:absolute;left:185px;bottom:105px;background:#FFFDE7;border:2px solid #8B6914;border-radius:18px 18px 18px 0;padding:9px 13px;font-size:11px;color:#5C3D1E;line-height:1.6;max-width:148px;z-index:5;opacity:0;transform:scale(0.85);transition:all 0.4s ease;pointer-events:none;font-weight:500}
.bubble.show{opacity:1;transform:scale(1)}

/* 하단 — 슬롯 작게, 단어 라벨 제거 */
.answer-section{background:#C8920A;padding:10px 18px 14px;border-top:3px solid #8B6914}
.answer-label{font-size:11px;color:rgba(92,61,30,0.85);margin-bottom:8px;text-align:center;font-weight:500}
.slots-all{display:flex;gap:6px;justify-content:center;align-items:center;margin-bottom:12px}
.slot{width:42px;height:42px;border-radius:8px;background:#A67A08;border:2px solid #8B6914;display:flex;align-items:center;justify-content:center;overflow:hidden;transition:all 0.45s cubic-bezier(.34,1.56,.64,1);box-shadow:inset 0 2px 4px rgba(0,0,0,0.2)}
.slot img{width:85%;height:85%;object-fit:contain;opacity:0;transform:scale(0.5);transition:all 0.45s cubic-bezier(.34,1.56,.64,1);filter:brightness(1.5) saturate(1.7)}
.slot.filled{border-color:#FFD700;background:#7A5A06;box-shadow:0 0 10px rgba(255,215,0,0.5),inset 0 2px 4px rgba(0,0,0,0.2)}
.slot.filled img{opacity:1;transform:scale(1)}

/* 단어 구분선 */
.slot-sep{color:#8B6914;font-size:18px;font-weight:700;margin:0 2px}

.main-btn{width:100%;background:#5C3D1E;color:#FFD700;border:2px solid #8B6914;border-radius:14px;padding:12px;font-size:14px;font-weight:500;cursor:pointer;transition:all 0.3s;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 3px 8px rgba(0,0,0,0.25)}
.main-btn:active{transform:scale(0.97);opacity:0.88}
.main-btn.done{background:#2D5A1E;color:#A8E6C3;border-color:#4CAF82}
.main-btn:disabled{opacity:0.5;cursor:default}

.clear{display:none;position:fixed;inset:0;background:rgba(40,25,5,0.97);flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:36px;z-index:100}
.clear.show{display:flex}
.clear-big{font-size:60px}
.clear-title{font-size:22px;font-weight:500;color:#FFD700}
.clear-sub{font-size:13px;color:rgba(255,215,0,0.6);margin-top:-8px}
.clear-word{display:flex;gap:3px;align-items:center;background:#5C3D1E;border:2px solid #FFD700;border-radius:14px;padding:10px 16px;flex-wrap:wrap;justify-content:center}
.clear-word img{width:44px;height:44px;object-fit:contain;filter:brightness(1.55) saturate(1.7)}
.clear-sep{color:#FFD700;font-size:18px;margin:0 5px}
.clear-text{font-size:13px;color:rgba(255,215,0,0.8);line-height:1.85}
.next-btn{background:#FFD700;color:#5C3D1E;border:none;border-radius:14px;padding:13px 32px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;box-shadow:0 3px 10px rgba(0,0,0,0.3)}
</style>
</head>
<body>

  <div>
    <div class="top-title">🔍 미어캣 미션</div>
    <div class="top-sub">벽에서 반짝이는 글자를 순서대로 찾아봐~</div>
  </div>
  <div class="steps">
    <div class="sdot done"></div>
    <div class="sdot active"></div>
    <div class="sdot"></div>
    <div class="sdot"></div>
    <div class="sdot"></div>
  </div>
</div>

  btn.textContent = '글자를 찾는 중...';
  setTimeout(() => document.getElementById('bubble').classList.add('show'), 500);
  reveals.forEach(r => {
    setTimeout(() => {
      document.getElementById(r.w).classList.add('glow');
      setTimeout(() => document.getElementById(r.s).classList.add('filled'), 450);
    }, r.d);
  });
  setTimeout(() => {
    btn.disabled = false;
    btn.textContent = '✅ 정답 확인하기';
    btn.classList.add('done');
    btn.onclick = () => document.getElementById('clearScreen').classList.add('show');
  }, 7400);
}
</script>
</body>
</html>
