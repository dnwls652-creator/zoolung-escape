<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>흰올빼미 미션 — 주렁주렁 숲 숨겨진 보물</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --dark-brown:#3A2214; --wood-brown:#5A321B;
  --jungle-green:#2F5D34;
  --gold:#D8A637; --gold-light:#F0C050;
  --orange:#F89C2A; --cream:#F6E2B3;
  --uv-blue:#7B5FFF; --uv-glow:#A78BFF;
  --night:#0A0818;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--dark-brown);min-height:100vh;display:flex;flex-direction:column;font-family:'Noto Sans KR',sans-serif;max-width:420px;margin:0 auto;overflow-x:hidden}

/* 반딧불 */
.firefly-container{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.firefly{position:absolute;border-radius:50%;background:var(--gold-light);box-shadow:0 0 6px 2px rgba(240,192,80,0.7);animation:flyFloat linear infinite;opacity:0}
@keyframes flyFloat{0%{opacity:0;transform:translateY(0) scale(0.5)}15%{opacity:1}85%{opacity:0.8}100%{opacity:0;transform:translateY(-120vh) translateX(30px) scale(1.2)}}

/* 상단 HUD */
.top-hud{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,#0A0818,#1A1040);border-bottom:3px solid var(--uv-blue);box-shadow:0 4px 20px rgba(123,95,255,0.4),0 0 30px rgba(123,95,255,0.1);padding:11px 16px 10px}
.hud-inner{display:flex;align-items:center;justify-content:space-between}
.hud-left{display:flex;align-items:center;gap:10px}
.hud-icon{width:36px;height:36px;object-fit:contain;filter:drop-shadow(0 0 6px rgba(167,139,255,0.8))}
.hud-text .hud-title{font-weight:900;font-size:16px;color:var(--uv-glow);text-shadow:0 0 12px rgba(167,139,255,0.8),2px 2px 0 rgba(0,0,0,0.5)}
.hud-text .hud-sub{font-size:10px;color:rgba(167,139,255,0.6);margin-top:2px}
.progress-tokens{display:flex;gap:4px;align-items:center}
.token{width:22px;height:22px;opacity:0.35;transition:all 0.4s;filter:grayscale(1)}
.token img{width:100%;height:100%;object-fit:contain}
.token.done{opacity:1;filter:grayscale(0) drop-shadow(0 0 5px rgba(240,192,80,0.8))}
.token.active{opacity:1;filter:grayscale(0) drop-shadow(0 0 8px rgba(167,139,255,1));animation:tokenPulse 1.5s ease-in-out infinite}
@keyframes tokenPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}

/* 씬 — 기본 상태: 어두운 밤 */
.scene{
  flex:1;position:relative;
  overflow:hidden;min-height:420px;
  background:linear-gradient(180deg,#0D0B20 0%,#1A1535 40%,#0D0820 100%);
  transition:background 1.2s ease;
}
.scene.uv-active{
  background:linear-gradient(180deg,#0D0820 0%,#1A0D40 40%,#0D0528 100%);
}



/* 별빛 배경 */
.stars{position:absolute;inset:0;pointer-events:none}
.star{position:absolute;border-radius:50%;background:#fff;opacity:0;animation:twinkle ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:0.1}50%{opacity:0.6}}

/* 올빼미 캐릭터 자리 (나중에 이미지 교체) */
.owl-char{
  position:absolute;
  right:-10px;bottom:0px;
  width:210px;z-index:4;
  animation:owlFloat 3s ease-in-out infinite;
  transform-origin:bottom right;
  filter:drop-shadow(0 0 10px rgba(167,139,255,0.3));
}
@keyframes owlFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

/* UV 램프 아이콘 */
50%{transform:scale(1.08) rotate(-3deg)}}

/* UV 빔 효과 */
.uv-beam{
  position:absolute;
  inset:0;
  background:radial-gradient(ellipse at 20% 90%, rgba(123,95,255,0.35) 0%, rgba(100,60,220,0.2) 35%, rgba(80,40,180,0.1) 60%, transparent 100%);
  opacity:0;
  transition:opacity 1.2s ease;
  pointer-events:none;
  z-index:3;
  mix-blend-mode:screen;
}
.uv-beam.show{opacity:1}

/* UV 글자 마커들 — 평소엔 완전 숨김 */
.uv-letter{
  position:absolute;
  width:70px;height:70px;
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  z-index:5;
  transition:all 0.6s ease;
  opacity:0;
  transform:scale(0.8);
}
.uv-letter img{
  width:90%;height:90%;
  object-fit:contain;
  filter:brightness(0) invert(1) sepia(1) saturate(3) hue-rotate(220deg);
  /* 기본: 완전 투명 */
  opacity:0;
  transition:all 0.8s ease;
}


/* UV 글자 개별 등장 */
.uv-letter.revealed{
  opacity:1;
  transform:scale(1);
  background:rgba(123,95,255,0.08);
  border:1px solid rgba(167,139,255,0.3);
  box-shadow:0 0 12px rgba(123,95,255,0.4),inset 0 0 8px rgba(167,139,255,0.1);
  animation:uvAppear 0.6s cubic-bezier(.34,1.56,.64,1);
}
@keyframes uvAppear{
  0%{opacity:0;transform:scale(0.5)}
  100%{opacity:1;transform:scale(1)}
}
.uv-letter.revealed img{
  opacity:1;
  filter:brightness(0.3) invert(1) sepia(1) saturate(5) hue-rotate(220deg) drop-shadow(0 0 8px rgba(167,139,255,1)) drop-shadow(0 0 16px rgba(123,95,255,0.8));
  animation:uvGlow 1.5s ease-in-out infinite;
}
@keyframes uvGlow{
  0%,100%{filter:brightness(0.3) invert(1) sepia(1) saturate(5) hue-rotate(220deg) drop-shadow(0 0 8px rgba(167,139,255,1)) drop-shadow(0 0 16px rgba(123,95,255,0.8))}
  50%{filter:brightness(0.5) invert(1) sepia(1) saturate(6) hue-rotate(220deg) drop-shadow(0 0 14px rgba(167,139,255,1)) drop-shadow(0 0 28px rgba(123,95,255,1))}
}

/* UV 안내 텍스트 */
.uv-guide{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  z-index:3;
  transition:opacity 0.5s;
}
.uv-guide.hide{opacity:0;pointer-events:none}
.uv-guide-icon{font-size:48px;margin-bottom:10px}
.uv-guide-text{
  font-size:15px;font-weight:700;
  color:rgba(167,139,255,0.8);
  text-shadow:0 0 12px rgba(123,95,255,0.6);
  line-height:1.6;
}

/* 하단 패널 */
.bottom-panel{background:linear-gradient(180deg,#0D0820,#1A0A30);border-top:3px solid var(--uv-blue);box-shadow:0 -6px 24px rgba(123,95,255,0.3);padding:13px 16px 18px;z-index:10}
.slot-label{display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:10px}
.slot-label-icon{width:22px;height:22px;object-fit:contain;filter:drop-shadow(0 0 4px rgba(167,139,255,0.7))}
.slot-label-text{font-size:11px;font-weight:700;color:rgba(167,139,255,0.65);letter-spacing:1px}

/* 슬롯 */
.slots-row{display:flex;gap:5px;justify-content:center;align-items:center;margin-bottom:13px}
.slot{width:52px;height:52px;border-radius:10px;background:linear-gradient(145deg,#0D0820,#1A0A30);border:2px solid rgba(123,95,255,0.35);display:flex;align-items:center;justify-content:center;overflow:hidden;transition:all 0.4s cubic-bezier(.34,1.56,.64,1);box-shadow:inset 0 2px 4px rgba(0,0,0,0.5),0 0 6px rgba(123,95,255,0.1)}
.slot img{width:82%;height:82%;object-fit:contain;opacity:0;transform:scale(0.4);transition:all 0.5s cubic-bezier(.34,1.56,.64,1);filter:brightness(0.8) invert(1) sepia(1) saturate(3) hue-rotate(220deg)}
.slot.filled{border-color:var(--uv-glow);background:linear-gradient(145deg,#1A0A40,#2A1060);box-shadow:inset 0 2px 4px rgba(0,0,0,0.3),0 0 14px rgba(123,95,255,0.6),0 0 28px rgba(123,95,255,0.25);animation:slotPopUV 0.5s cubic-bezier(.34,1.56,.64,1)}
.slot.filled img{opacity:1;transform:scale(1)}
@keyframes slotPopUV{0%{transform:scale(0.85)}60%{transform:scale(1.12)}100%{transform:scale(1)}}
.gem-sep{width:10px;height:10px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#C0A0FF,var(--uv-blue));box-shadow:0 0 8px rgba(123,95,255,0.8);flex-shrink:0;margin:0 3px}

/* UV 버튼 */

.uv-btn-lamp{
  width:44px;height:44px;
  object-fit:contain;
  flex-shrink:0;
  filter:drop-shadow(0 0 6px rgba(167,139,255,0.6));
  transition:all 0.3s;
}
.uv-btn:not(:disabled):hover .uv-btn-lamp,
.uv-btn.done .uv-btn-lamp{
  filter:drop-shadow(0 0 12px rgba(167,139,255,1));
}
.uv-btn{
  width:100%;
  background:linear-gradient(180deg,#9070FF 0%,var(--uv-blue) 50%,#4A30C0 100%);
  color:#fff;border:none;border-radius:16px;padding:13px 16px;
  font-size:15px;font-weight:900;font-family:'Noto Sans KR',sans-serif;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;
  box-shadow:0 4px 0 #2A10A0,0 6px 20px rgba(123,95,255,0.5),inset 0 1px 0 rgba(255,255,255,0.3);
  transition:all 0.15s ease;position:relative;overflow:hidden;
  text-shadow:0 1px 0 rgba(0,0,0,0.3);
}
.uv-btn::before{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);animation:btnShine 3s ease-in-out infinite}
@keyframes btnShine{0%{left:-100%}40%{left:150%}100%{left:150%}}
.uv-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #2A10A0,0 3px 10px rgba(123,95,255,0.3)}
.uv-btn.done{background:linear-gradient(180deg,#5FA050,var(--jungle-green));box-shadow:0 4px 0 #1A3A20,0 6px 16px rgba(47,93,52,0.4);color:#C8F0C0}
.uv-btn:disabled{opacity:0.55;cursor:default;transform:none}
.uv-btn-icon{width:26px;height:26px;object-fit:contain}

/* 클리어 */
.clear-screen{display:none;position:fixed;inset:0;background:radial-gradient(ellipse at center,#1A0A35,#0A0515);flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:32px;z-index:100}
.clear-screen.show{display:flex;animation:clearIn 0.5s ease}
@keyframes clearIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
.clear-chest{width:110px;height:110px;object-fit:contain;animation:chestBounce 0.8s cubic-bezier(.34,1.56,.64,1) 0.2s both;filter:drop-shadow(0 0 20px rgba(248,156,42,0.6))}
@keyframes chestBounce{from{transform:scale(0) rotate(-15deg)}to{transform:scale(1) rotate(0)}}
.clear-title{font-size:26px;font-weight:900;color:var(--uv-glow);text-shadow:0 0 20px rgba(167,139,255,0.7),2px 2px 0 rgba(0,0,0,0.5)}
.clear-sub{font-size:13px;color:rgba(167,139,255,0.7);margin-top:-8px}
.clear-word-row{display:flex;gap:4px;align-items:center;background:linear-gradient(145deg,#1A0A35,#0A0520);border:2px solid var(--uv-blue);border-radius:16px;padding:12px 18px;flex-wrap:wrap;justify-content:center;box-shadow:0 0 20px rgba(123,95,255,0.4)}
.clear-word-row img{width:44px;height:44px;object-fit:contain;filter:brightness(0.5) invert(1) sepia(1) saturate(4) hue-rotate(220deg) drop-shadow(0 0 6px rgba(167,139,255,0.8))}
.clear-gem{width:8px;height:8px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#C0A0FF,var(--uv-blue));box-shadow:0 0 8px rgba(123,95,255,0.8);margin:0 4px}
.clear-text{font-size:14px;color:rgba(167,139,255,0.85);line-height:1.85;font-weight:500}
.clear-next-btn{background:linear-gradient(180deg,#F0B030,var(--orange));color:var(--dark-brown);border:none;border-radius:16px;padding:14px 36px;font-size:16px;font-weight:900;cursor:pointer;box-shadow:0 4px 0 #8B5010,0 8px 20px rgba(248,156,42,0.4);transition:all 0.15s;font-family:'Noto Sans KR',sans-serif}
.clear-next-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #8B5010}
</style>
</head>

// 글자 이미지 주입
document.querySelectorAll('img[data-p]').forEach(el => { el.src = PIECES[+el.dataset.p]; });

// 별 생성
(function(){
  const s = document.getElementById('stars');
  for(let i=0;i<60;i++){
    const star = document.createElement('div');
    star.className = 'star';
    const size = 1+Math.random()*2;
    star.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*70}%;width:${size}px;height:${size}px;animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*4}s`;
    s.appendChild(star);
  }
})();

// 반딧불
(function(){
  const c = document.getElementById('fireflies');
  for(let i=0;i<15;i++){
    const f=document.createElement('div');
    f.className='firefly';
    f.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${2+Math.random()*3}px;height:${2+Math.random()*3}px;animation-duration:${6+Math.random()*10}s;animation-delay:${Math.random()*8}s`;
    c.appendChild(f);
  }
})();

let uvOn = false;
let started = false;

function startUV() {
  if(started) return;

  const btn = document.getElementById('mainBtn');
  const scene = document.getElementById('scene');
  const beam = document.getElementById('uvBeam');
  const guide = document.getElementById('uvGuide');

  // UV 램프 켜기
  btn.disabled = true;
  btn.textContent = '🔦 UV 램프 켜는 중...';

  setTimeout(() => {
    beam.classList.add('show');
    scene.classList.add('uv-active');
    guide.classList.add('hide');
    const reveals = [
      {ul:'ul1', s:'s1', d:600},
      {ul:'ul2', s:'s2', d:1400},
      {ul:'ul3', s:'s3', d:2200},
      {ul:'ul4', s:'s4', d:3200},
      {ul:'ul5', s:'s5', d:4000},
      {ul:'ul6', s:'s6', d:4800},
    ];

    reveals.forEach(rv => {
      setTimeout(() => {
        document.getElementById(rv.ul).classList.add('revealed');
        setTimeout(() => {
          document.getElementById(rv.s).classList.add('filled');
        }, 500);
      }, rv.d);
    });

    setTimeout(() => {
      started = true;
      btn.disabled = false;
      btn.innerHTML = `✅ 정답 확인하기`;
      btn.classList.add('done');
      btn.onclick = () => document.getElementById('clearScreen').classList.add('show');
    }, 6000);

  }, 600);
}
</script>
