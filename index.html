<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>주렁주렁 숲 숨겨진 보물</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --dark-brown:#3A2214; --wood-brown:#5A321B;
  --jungle-green:#2F5D34;
  --gold:#D8A637; --gold-light:#F0C050;
  --orange:#F89C2A; --cream:#F6E2B3;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:radial-gradient(ellipse at top, #2A3A1A 0%, var(--dark-brown) 60%);
  min-height:100vh;
  font-family:'Noto Sans KR',sans-serif;
  max-width:420px;
  margin:0 auto;
  overflow-x:hidden;
  padding-bottom:32px;
}

/* 반딧불 */
.firefly-container{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.firefly{position:absolute;border-radius:50%;background:var(--gold-light);box-shadow:0 0 6px 2px rgba(240,192,80,0.7);animation:flyFloat linear infinite;opacity:0}
@keyframes flyFloat{0%{opacity:0;transform:translateY(0) scale(0.5)}15%{opacity:1}85%{opacity:0.8}100%{opacity:0;transform:translateY(-120vh) translateX(30px) scale(1.2)}}

/* 헤더 */
.header{
  position:relative;z-index:2;
  text-align:center;
  padding:32px 20px 20px;
}
.header-logo{
  width:80px;height:80px;
  object-fit:contain;
  margin:0 auto 12px;
  display:block;
  filter:drop-shadow(0 0 16px rgba(240,192,80,0.6));
  animation:logoBounce 3s ease-in-out infinite;
}
@keyframes logoBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.header-title{
  font-size:26px;font-weight:900;
  color:var(--gold-light);
  text-shadow:0 0 20px rgba(240,192,80,0.5),2px 2px 0 rgba(0,0,0,0.6);
  line-height:1.2;
  letter-spacing:-0.5px;
}
.header-sub{
  font-size:13px;
  color:rgba(246,226,179,0.65);
  margin-top:6px;
  font-weight:500;
}
.header-divider{
  width:80%;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  margin:14px auto 0;
  border-radius:2px;
}

/* 미션 선택 안내 */
.section-label{
  text-align:center;
  font-size:12px;font-weight:700;
  color:rgba(246,226,179,0.5);
  letter-spacing:2px;
  margin:20px 0 12px;
  position:relative;z-index:2;
}

/* 미션 카드 */
.mission-list{
  display:flex;flex-direction:column;
  gap:10px;
  padding:0 16px;
  position:relative;z-index:2;
}
.mission-card{
  display:flex;align-items:center;gap:14px;
  padding:14px 16px;
  border-radius:18px;
  border:2px solid rgba(255,255,255,0.08);
  text-decoration:none;
  position:relative;overflow:hidden;
  transition:all 0.2s ease;
  cursor:pointer;
}
.mission-card.ready{
  background:linear-gradient(135deg, var(--c1) 0%, var(--c2) 100%);
  border-color:rgba(255,255,255,0.2);
  box-shadow:0 4px 20px var(--cs), 0 2px 0 rgba(255,255,255,0.15) inset;
}
.mission-card.ready:active{
  transform:scale(0.97) translateY(1px);
  box-shadow:0 2px 10px var(--cs);
}
.mission-card.locked{
  background:linear-gradient(135deg, var(--c1), var(--c2));
  border-color:rgba(255,255,255,0.06);
  cursor:default;
}

/* 카드 빛나는 효과 */
.card-glow{
  position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.12) 0%,transparent 60%);
  border-radius:16px;
  pointer-events:none;
}

/* 아이콘 */
.card-icon-wrap{
  width:58px;height:58px;flex-shrink:0;
  background:rgba(0,0,0,0.2);
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  border:1.5px solid rgba(255,255,255,0.15);
  box-shadow:inset 0 2px 4px rgba(0,0,0,0.3);
}
.locked-icon{background:rgba(0,0,0,0.3);border-color:rgba(255,255,255,0.08)}
.card-icon{width:46px;height:46px;object-fit:contain;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3))}
.lock-emoji{font-size:24px;opacity:0.5}

/* 카드 텍스트 */
.card-info{flex:1;min-width:0}
.card-emoji{font-size:13px;margin-bottom:1px;opacity:0.9}
.card-name{
  font-size:15px;font-weight:900;
  color:#fff;
  text-shadow:1px 1px 0 rgba(0,0,0,0.4);
  letter-spacing:-0.3px;
}
.card-desc{
  font-size:11px;
  color:rgba(255,255,255,0.72);
  margin-top:2px;
  line-height:1.4;
}
.card-badge{
  display:inline-block;
  margin-top:5px;
  background:rgba(0,0,0,0.25);
  color:rgba(255,255,255,0.9);
  font-size:10px;font-weight:700;
  padding:2px 8px;
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.2);
}
.card-badge.coming{
  background:rgba(0,0,0,0.35);
  color:rgba(255,255,255,0.4);
  border-color:rgba(255,255,255,0.1);
}
.card-arrow{
  font-size:16px;
  color:rgba(255,255,255,0.7);
  flex-shrink:0;
  font-weight:700;
}

/* 하단 안내 */
.footer-note{
  text-align:center;
  font-size:11px;
  color:rgba(246,226,179,0.35);
  margin-top:24px;
  padding:0 20px;
  position:relative;z-index:2;
  line-height:1.6;
}
</style>
</head>
