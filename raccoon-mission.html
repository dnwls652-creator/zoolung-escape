<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>라쿤 미션 — 주렁주렁 숲 숨겨진 보물</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --dark-brown:#3A2214; --wood-brown:#5A321B;
  --jungle-green:#2F5D34;
  --gold:#D8A637; --gold-light:#F0C050;
  --orange:#F89C2A; --cream:#F6E2B3;
  --char:#1B1F24; --char2:#0E1114;
  --mint:#39D6C0; --mint-light:#7FF0E0; --mint-deep:#1E8C7E;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--dark-brown);min-height:100vh;display:flex;flex-direction:column;font-family:'Noto Sans KR',sans-serif;max-width:420px;margin:0 auto;overflow-x:hidden}

/* 반딧불 */
.firefly-container{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.firefly{position:absolute;border-radius:50%;background:var(--mint-light);box-shadow:0 0 6px 2px rgba(127,240,224,0.6);animation:flyFloat linear infinite;opacity:0}
@keyframes flyFloat{0%{opacity:0;transform:translateY(0) scale(0.5)}15%{opacity:1}85%{opacity:0.8}100%{opacity:0;transform:translateY(-120vh) translateX(30px) scale(1.2)}}

/* 상단 HUD */
.top-hud{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,#0C0E11,#1B1F24);border-bottom:3px solid var(--mint);box-shadow:0 4px 20px rgba(57,214,192,0.35),0 0 30px rgba(57,214,192,0.08);padding:11px 16px 10px}
.hud-inner{display:flex;align-items:center;justify-content:space-between}
.hud-left{display:flex;align-items:center;gap:10px}
.hud-icon{width:36px;height:36px;object-fit:contain;filter:drop-shadow(0 0 6px rgba(127,240,224,0.7))}
.hud-text .hud-title{font-weight:900;font-size:16px;color:var(--mint-light);text-shadow:0 0 12px rgba(127,240,224,0.7),2px 2px 0 rgba(0,0,0,0.5)}
.hud-text .hud-sub{font-size:10px;color:rgba(127,240,224,0.55);margin-top:2px}
.progress-tokens{display:flex;gap:4px;align-items:center}
.token{width:22px;height:22px;opacity:0.35;transition:all 0.4s;filter:grayscale(1)}
.token img{width:100%;height:100%;object-fit:contain}
.token.done{opacity:1;filter:grayscale(0) drop-shadow(0 0 5px rgba(240,192,80,0.8))}
.token.active{opacity:1;filter:grayscale(0) drop-shadow(0 0 8px rgba(127,240,224,1));animation:tokenPulse 1.5s ease-in-out infinite}
@keyframes tokenPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}

/* 씬 */
.scene{flex:1;position:relative;overflow:hidden;min-height:430px;background:linear-gradient(180deg,#12161A 0%,#0C0F12 60%,#080A0C 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px 16px 8px}

/* 별빛 */
.stars{position:absolute;inset:0;pointer-events:none}
.star{position:absolute;border-radius:50%;background:#fff;opacity:0;animation:twinkle ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:0.08}50%{opacity:0.45}}

/* 촉각 상자 */
.touch-wrap{position:relative;width:100%;max-width:330px;aspect-ratio:1/0.82;z-index:4}
.touch-box{
  position:relative;width:100%;height:100%;
  border-radius:20px;overflow:hidden;
  border:3px solid rgba(57,214,192,0.35);
  box-shadow:0 10px 30px rgba(0,0,0,0.6),inset 0 0 40px rgba(0,0,0,0.7),0 0 22px rgba(57,214,192,0.18);
  background:radial-gradient(ellipse at 50% 40%, #20262C 0%, #15191D 55%, #0C0F12 100%);
  cursor:grab;touch-action:none;
}
.touch-box:active{cursor:grabbing}
/* 숨겨진 정답(하트) 레이어 */
.hidden-layer{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px}
.hidden-heart{
  font-size:150px;line-height:1;
  color:var(--mint);
  text-shadow:0 0 18px rgba(57,214,192,0.9),0 0 40px rgba(57,214,192,0.5);
  filter:drop-shadow(0 0 10px rgba(127,240,224,0.7));
  user-select:none;
}
.hidden-sub{font-size:13px;font-weight:700;color:rgba(127,240,224,0.85);letter-spacing:2px;text-shadow:0 0 10px rgba(57,214,192,0.6)}
/* 긁어내는 캔버스(덮개) */
#coverCanvas{position:absolute;inset:0;width:100%;height:100%;z-index:2}
/* 안내 텍스트 */
.touch-guide{display:none}
.touch-guide.hide{opacity:0}
.touch-guide-finger{font-size:46px;margin-bottom:8px;animation:rub 1.6s ease-in-out infinite}
@keyframes rub{0%,100%{transform:translateX(-14px) rotate(-8deg)}50%{transform:translateX(14px) rotate(8deg)}}
.touch-guide-text{font-size:14px;font-weight:700;color:rgba(127,240,224,0.85);text-shadow:0 0 10px rgba(57,214,192,0.6);line-height:1.6}

/* 라쿤 캐릭터 */
.raccoon-char{position:absolute;right:-40px;bottom:-70px;width:175px;z-index:5;animation:rcBreathe 4s ease-in-out infinite;transform-origin:bottom right;filter:drop-shadow(2px 4px 10px rgba(0,0,0,0.6))}
@keyframes rcBreathe{0%,100%{transform:scale(1)}50%{transform:scale(1.035)}}

/* 하단 패널 */
.bottom-panel{background:linear-gradient(180deg,#0C0F12,#15191D);border-top:3px solid var(--mint);box-shadow:0 -6px 24px rgba(57,214,192,0.25);padding:13px 16px 18px;z-index:10}
.slot-label{display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:10px}
.slot-label-icon{width:22px;height:22px;object-fit:contain;filter:drop-shadow(0 0 4px rgba(127,240,224,0.7))}
.slot-label-text{font-size:11px;font-weight:700;color:rgba(127,240,224,0.6);letter-spacing:1px}

/* 진행 게이지 */
.touch-meter{height:12px;border-radius:8px;background:rgba(255,255,255,0.08);border:1px solid rgba(57,214,192,0.3);overflow:hidden;margin-bottom:8px;box-shadow:inset 0 2px 4px rgba(0,0,0,0.5)}
.touch-meter-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--mint-deep),var(--mint),var(--mint-light));box-shadow:0 0 12px rgba(57,214,192,0.7);transition:width 0.2s ease;border-radius:8px}
.meter-caption{text-align:center;font-size:11px;color:rgba(127,240,224,0.6);margin-bottom:13px;font-weight:500}

/* 슬롯(찾은 글자 = 하트 한 칸) */
.slots-row{display:flex;gap:5px;justify-content:center;align-items:center;margin-bottom:13px}
.slot{width:60px;height:60px;border-radius:12px;background:linear-gradient(145deg,#0C0F12,#181D22);border:2px solid rgba(57,214,192,0.35);display:flex;align-items:center;justify-content:center;overflow:hidden;transition:all 0.4s cubic-bezier(.34,1.56,.64,1);box-shadow:inset 0 2px 4px rgba(0,0,0,0.5),0 0 6px rgba(57,214,192,0.1);font-size:34px;color:rgba(127,240,224,0.15)}
.slot.filled{border-color:var(--mint-light);background:linear-gradient(145deg,#0E2A28,#15403A);box-shadow:inset 0 2px 4px rgba(0,0,0,0.3),0 0 14px rgba(57,214,192,0.6),0 0 28px rgba(57,214,192,0.25);color:var(--mint-light);text-shadow:0 0 12px rgba(57,214,192,0.9);animation:slotPop 0.5s cubic-bezier(.34,1.56,.64,1)}
@keyframes slotPop{0%{transform:scale(0.85)}60%{transform:scale(1.12)}100%{transform:scale(1)}}

/* 버튼 */
.touch-btn{width:100%;background:linear-gradient(180deg,#4FE6D2 0%,var(--mint) 50%,var(--mint-deep) 100%);color:#06302B;border:none;border-radius:16px;padding:13px 16px;font-size:15px;font-weight:900;font-family:'Noto Sans KR',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 0 #0E5A50,0 6px 20px rgba(57,214,192,0.45),inset 0 1px 0 rgba(255,255,255,0.4);transition:all 0.15s ease;position:relative;overflow:hidden;text-shadow:0 1px 0 rgba(255,255,255,0.2)}
.touch-btn::before{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.25),transparent);animation:btnShine 3s ease-in-out infinite}
@keyframes btnShine{0%{left:-100%}40%{left:150%}100%{left:150%}}
.touch-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #0E5A50,0 3px 10px rgba(57,214,192,0.3)}
.touch-btn:disabled{opacity:0.5;cursor:default;transform:none}
.touch-btn:disabled::before{display:none}

/* 클리어 */
.clear-screen{display:none;position:fixed;inset:0;background:radial-gradient(ellipse at center,#0E2A28,#080A0C);flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:32px;z-index:100;max-width:420px;margin:0 auto}
.clear-screen.show{display:flex;animation:clearIn 0.5s ease}
@keyframes clearIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
.clear-chest{width:110px;height:110px;object-fit:contain;animation:chestBounce 0.8s cubic-bezier(.34,1.56,.64,1) 0.2s both;filter:drop-shadow(0 0 20px rgba(57,214,192,0.6))}
@keyframes chestBounce{from{transform:scale(0) rotate(-15deg)}to{transform:scale(1) rotate(0)}}
.clear-title{font-size:26px;font-weight:900;color:var(--mint-light);text-shadow:0 0 20px rgba(127,240,224,0.7),2px 2px 0 rgba(0,0,0,0.5)}
.clear-sub{font-size:13px;color:rgba(127,240,224,0.7);margin-top:-8px}
.clear-word-row{display:flex;gap:4px;align-items:center;background:linear-gradient(145deg,#0E2A28,#081E1C);border:2px solid var(--mint);border-radius:16px;padding:14px 26px;justify-content:center;box-shadow:0 0 20px rgba(57,214,192,0.35);font-size:56px;color:var(--mint-light);text-shadow:0 0 16px rgba(57,214,192,0.9)}
.clear-text{font-size:14px;color:rgba(127,240,224,0.85);line-height:1.85;font-weight:500}
.clear-next-btn{background:linear-gradient(180deg,#4FE6D2,var(--mint));color:#06302B;border:none;border-radius:16px;padding:14px 36px;font-size:16px;font-weight:900;cursor:pointer;box-shadow:0 4px 0 #0E5A50,0 8px 20px rgba(57,214,192,0.4);transition:all 0.15s;font-family:'Noto Sans KR',sans-serif}
.clear-next-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #0E5A50}
</style>
</head>

<script>
// 별 생성
(function(){
  const s=document.getElementById('stars');
  for(let i=0;i<55;i++){
    const st=document.createElement('div');st.className='star';
    const sz=1+Math.random()*2;
    st.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*80}%;width:${sz}px;height:${sz}px;animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*4}s`;
    s.appendChild(st);
  }
})();
// 반딧불
(function(){
  const c=document.getElementById('fireflies');
  for(let i=0;i<14;i++){
    const f=document.createElement('div');f.className='firefly';
    f.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${2+Math.random()*3}px;height:${2+Math.random()*3}px;animation-duration:${6+Math.random()*10}s;animation-delay:${Math.random()*8}s`;
    c.appendChild(f);
  }
})();

const box=document.getElementById('touchBox');
const canvas=document.getElementById('coverCanvas');
const ctx=canvas.getContext('2d');
const guide=document.getElementById('touchGuide');
const meterFill=document.getElementById('meterFill');
const meterCap=document.getElementById('meterCap');
const mainBtn=document.getElementById('mainBtn');
const heartSlot=document.getElementById('heartSlot');

let solved=false, cleared=false, touched=false;
const BRUSH=40;          // 손끝 반경 (크게 → 한 번에 넓게 벗겨짐)
const THRESHOLD=30;      // 몇 % 문지르면 정답 인정 (낮게 → 빨리 끝남)

// 캔버스 크기를 박스 크기에 맞추고 덮개 다시 그리기
function paintCover(){
  const r=box.getBoundingClientRect();
  canvas.width=r.width; canvas.height=r.height;
  // 어두운 촉각 표면 + 미세한 무늬
  const g=ctx.createLinearGradient(0,0,r.width,r.height);
  g.addColorStop(0,'#262C32'); g.addColorStop(0.5,'#1A2025'); g.addColorStop(1,'#11161A');
  ctx.globalCompositeOperation='source-over';
  ctx.fillStyle=g; ctx.fillRect(0,0,r.width,r.height);
  // 점 무늬(촉각 느낌)
  ctx.fillStyle='rgba(57,214,192,0.05)';
  for(let i=0;i<140;i++){
    ctx.beginPath();
    ctx.arc(Math.random()*r.width,Math.random()*r.height,1+Math.random()*1.5,0,Math.PI*2);
    ctx.fill();
  }
}
paintCover();
window.addEventListener('resize',()=>{ if(!solved) paintCover(); });

function eraseAt(x,y){
  ctx.globalCompositeOperation='destination-out';
  ctx.beginPath();
  ctx.arc(x,y,BRUSH,0,Math.PI*2);
  ctx.fill();
  // 부드러운 가장자리
  ctx.beginPath();
  ctx.arc(x,y,BRUSH*1.5,0,Math.PI*2);
  ctx.globalAlpha=0.25; ctx.fill(); ctx.globalAlpha=1;
}

function getPos(e){
  const r=canvas.getBoundingClientRect();
  const p=e.touches?e.touches[0]:e;
  return {x:(p.clientX-r.left)*(canvas.width/r.width), y:(p.clientY-r.top)*(canvas.height/r.height)};
}

function updateMeter(){
  // 투명해진 픽셀 비율 계산
  const img=ctx.getImageData(0,0,canvas.width,canvas.height).data;
  let clear=0;
  for(let i=3;i<img.length;i+=4*40){ if(img[i]<40) clear++; }
  const total=img.length/(4*40);
  let raw=clear/total*100;                               // 실제로 문지른 비율
  let shown=Math.min(100,Math.round(raw/THRESHOLD*100)); // 화면 표시: THRESHOLD를 100%로 환산
  meterFill.style.width=shown+'%';
  meterCap.textContent='상자를 문지른 정도: '+shown+'%';
  if(shown>=100 && !solved){
    solved=true;
    heartSlot.classList.add('filled');
    mainBtn.disabled=false;
    mainBtn.textContent='✅ 정답 확인하기';
    mainBtn.onclick=()=>document.getElementById('clearScreen').classList.add('show');
    // 남은 덮개 부드럽게 사라지기
    canvas.style.transition='opacity 0.8s ease';
    canvas.style.opacity='0';
  }
}

let drawing=false, moveCount=0;
function start(e){ drawing=true; if(!touched){touched=true;guide.classList.add('hide');} move(e); }
function move(e){
  if(!drawing||solved) return;
  e.preventDefault();
  const p=getPos(e);
  eraseAt(p.x,p.y);
  moveCount++;
  if(moveCount%3===0) updateMeter();
}
function end(){ drawing=false; if(!solved) updateMeter(); }

box.addEventListener('mousedown',start);
box.addEventListener('mousemove',move);
window.addEventListener('mouseup',end);
box.addEventListener('touchstart',start,{passive:false});
box.addEventListener('touchmove',move,{passive:false});
box.addEventListener('touchend',end);
</script>
