<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>카피바라 미션 — 주렁주렁 숲 숨겨진 보물</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --dark-brown:#3A2214; --wood-brown:#5A321B;
  --gold:#D8A637; --gold-light:#F0C050;
  --orange:#F89C2A; --cream:#F6E2B3;
  --capy:#C8794A; --capy-light:#E8A66B; --capy-deep:#8B4F2A;
  --coral:#F2756B; --coral-light:#FF9B8F;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--dark-brown);min-height:100vh;display:flex;flex-direction:column;font-family:'Noto Sans KR',sans-serif;max-width:420px;margin:0 auto;overflow-x:hidden}

.firefly-container{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.firefly{position:absolute;border-radius:50%;background:var(--gold-light);box-shadow:0 0 6px 2px rgba(240,192,80,0.7);animation:flyFloat linear infinite;opacity:0}
@keyframes flyFloat{0%{opacity:0;transform:translateY(0) scale(0.5)}15%{opacity:1}85%{opacity:0.8}100%{opacity:0;transform:translateY(-120vh) translateX(30px) scale(1.2)}}

.top-hud{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,#2A1608,var(--capy-deep));border-bottom:3px solid var(--capy-light);box-shadow:0 4px 20px rgba(200,121,74,0.4);padding:11px 16px 10px}
.hud-inner{display:flex;align-items:center;justify-content:space-between}
.hud-left{display:flex;align-items:center;gap:10px}
.hud-icon{width:36px;height:36px;object-fit:contain;filter:drop-shadow(0 0 6px rgba(232,166,107,0.6))}
.hud-text .hud-title{font-weight:900;font-size:16px;color:var(--capy-light);text-shadow:0 0 12px rgba(232,166,107,0.6),2px 2px 0 rgba(0,0,0,0.5)}
.hud-text .hud-sub{font-size:10px;color:rgba(246,226,179,0.6);margin-top:2px}
.progress-tokens{display:flex;gap:4px;align-items:center}
.token{width:22px;height:22px;opacity:0.35;transition:all 0.4s;filter:grayscale(1)}
.token img{width:100%;height:100%;object-fit:contain}
.token.done{opacity:1;filter:grayscale(0) drop-shadow(0 0 5px rgba(240,192,80,0.8))}
.token.active{opacity:1;filter:grayscale(0) drop-shadow(0 0 8px rgba(232,166,107,1));animation:tokenPulse 1.5s ease-in-out infinite}
@keyframes tokenPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}

.scene{flex:1;position:relative;overflow:hidden;background:linear-gradient(180deg,#2A1A0E,#1A0E05);padding:12px;display:flex;align-items:center}
.map-wrap{position:relative;width:100%;border-radius:14px;overflow:hidden;border:2px solid rgba(232,166,107,0.4);box-shadow:0 6px 20px rgba(0,0,0,0.5)}
.map-img{width:100%;display:block}

.pin{position:absolute;transform:translate(-50%,-100%);z-index:5;cursor:pointer;width:30px;height:40px;transition:transform 0.15s}
.pin svg{width:100%;height:100%;filter:drop-shadow(0 3px 4px rgba(0,0,0,0.45))}
.pin .pin-char{position:absolute;top:4px;left:0;width:100%;text-align:center;font-size:15px;font-weight:900;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.6)}
.pin .pin-body{fill:#B0683C;stroke:#fff;stroke-width:2}
.pin.filled .pin-body{fill:var(--coral)}
.pin.pulse{animation:pinPulse 1.4s ease-in-out infinite}
@keyframes pinPulse{0%,100%{transform:translate(-50%,-100%) scale(1)}50%{transform:translate(-50%,-100%) scale(1.13)}}
.pin:active{transform:translate(-50%,-100%) scale(0.9)}

.map-guide{display:flex;align-items:center;gap:9px;margin:10px 12px 12px;padding:11px 14px;background:linear-gradient(180deg,rgba(232,166,107,0.16),rgba(139,79,42,0.12));border:1.5px solid rgba(232,166,107,0.45);border-radius:13px;box-shadow:0 3px 12px rgba(0,0,0,0.3)}
.map-guide .mg-heart{font-size:20px;flex-shrink:0;filter:drop-shadow(0 1px 3px rgba(0,0,0,0.4))}
.map-guide .mg-text{font-size:12.5px;line-height:1.5;font-weight:600;color:var(--cream)}
.map-guide .mg-text b{color:var(--capy-light);font-weight:800}
.bottom-panel{background:linear-gradient(180deg,#2A1608,var(--dark-brown));border-top:3px solid var(--capy-light);box-shadow:0 -6px 24px rgba(0,0,0,0.6);padding:13px 16px 18px;z-index:10}
.slot-label{display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:10px}
.slot-label-icon{width:20px;height:20px;object-fit:contain}
.slot-label-text{font-size:11px;font-weight:700;color:rgba(246,226,179,0.65);letter-spacing:0.5px}
.slots-row{display:flex;gap:6px;justify-content:center;align-items:center;margin-bottom:13px}
.slot{width:48px;height:48px;border-radius:10px;background:linear-gradient(145deg,#2A1608,#3A2214);border:2px solid rgba(232,166,107,0.45);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;color:rgba(246,226,179,0.25);transition:all 0.4s cubic-bezier(.34,1.56,.64,1);box-shadow:inset 0 2px 4px rgba(0,0,0,0.5)}
.slot.filled{border-color:var(--capy-light);background:linear-gradient(145deg,#5A3418,#7A4A24);color:#fff;text-shadow:0 0 10px rgba(232,166,107,0.8);box-shadow:inset 0 2px 4px rgba(0,0,0,0.3),0 0 14px rgba(200,121,74,0.5);animation:slotPop 0.5s cubic-bezier(.34,1.56,.64,1)}
@keyframes slotPop{0%{transform:scale(0.85)}60%{transform:scale(1.12)}100%{transform:scale(1)}}

.main-btn{width:100%;background:linear-gradient(180deg,var(--capy-light) 0%,var(--capy) 50%,var(--capy-deep) 100%);color:#fff;border:none;border-radius:16px;padding:13px 16px;font-size:15px;font-weight:900;font-family:'Noto Sans KR',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 0 #5A3418,0 6px 20px rgba(200,121,74,0.45),inset 0 1px 0 rgba(255,255,255,0.3);transition:all 0.15s ease;position:relative;overflow:hidden;text-shadow:0 1px 0 rgba(0,0,0,0.3)}
.main-btn::before{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.22),transparent);animation:btnShine 3s ease-in-out infinite}
@keyframes btnShine{0%{left:-100%}40%{left:150%}100%{left:150%}}
.main-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #5A3418}
.main-btn.done{background:linear-gradient(180deg,#5FA050,var(--jungle-green,#2F5D34));box-shadow:0 4px 0 #1A3A20}
.main-btn.shake{background:linear-gradient(180deg,#E0604F,#A8362A);box-shadow:0 4px 0 #6A1E16;animation:btnShake 0.4s ease}
@keyframes btnShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
.main-btn:disabled{opacity:0.5;cursor:default;transform:none}
.main-btn:disabled::before{display:none}

.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:50;align-items:flex-end;justify-content:center}
.modal-bg.show{display:flex;animation:fadeIn 0.25s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{width:100%;max-width:420px;background:linear-gradient(180deg,#3A2214,#2A1608);border-top:3px solid var(--capy-light);border-radius:20px 20px 0 0;padding:18px 16px 22px;animation:slideUp 0.3s cubic-bezier(.34,1.4,.64,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{text-align:center;font-size:15px;font-weight:900;color:var(--capy-light);margin-bottom:4px}
.modal-sub{text-align:center;font-size:11px;color:rgba(246,226,179,0.6);margin-bottom:14px}
.modal-display{text-align:center;font-size:40px;font-weight:900;color:#fff;height:60px;line-height:60px;margin-bottom:14px;background:rgba(0,0,0,0.25);border-radius:12px;border:2px solid rgba(232,166,107,0.4)}
.modal-display.empty{color:rgba(246,226,179,0.2)}

.kbd{display:flex;flex-direction:column;gap:6px}
.kbd-row{display:flex;gap:5px;justify-content:center}
.key{flex:1;height:46px;border-radius:9px;background:linear-gradient(180deg,#5A3A1E,#3A2410);border:1px solid rgba(232,166,107,0.3);color:#F6E2B3;font-size:20px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all 0.1s;display:flex;align-items:center;justify-content:center}
.key:active{transform:scale(0.92);background:var(--capy)}
.modal-btns{display:flex;gap:8px;margin-top:14px}
.modal-btn{flex:1;padding:12px;border-radius:12px;border:none;font-size:14px;font-weight:900;font-family:'Noto Sans KR',sans-serif;cursor:pointer}
.modal-btn.cancel{background:rgba(255,255,255,0.12);color:rgba(246,226,179,0.7)}
.modal-btn.ok{background:linear-gradient(180deg,var(--capy-light),var(--capy));color:#fff;box-shadow:0 3px 0 #5A3418}
.modal-btn.ok:disabled{opacity:0.4}
.modal-btn:active{transform:translateY(2px)}

.clear-screen{display:none;position:fixed;inset:0;background:radial-gradient(ellipse at center,#3A2214,#1A0E05);flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:32px;z-index:100;max-width:420px;margin:0 auto}
.clear-screen.show{display:flex;animation:clearIn 0.5s ease}
@keyframes clearIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
.clear-chest{width:110px;height:110px;object-fit:contain;animation:chestBounce 0.8s cubic-bezier(.34,1.56,.64,1) 0.2s both;filter:drop-shadow(0 0 20px rgba(248,156,42,0.6))}
@keyframes chestBounce{from{transform:scale(0) rotate(-15deg)}to{transform:scale(1) rotate(0)}}
.clear-title{font-size:26px;font-weight:900;color:var(--capy-light);text-shadow:0 0 20px rgba(232,166,107,0.7),2px 2px 0 rgba(0,0,0,0.5)}
.clear-sub{font-size:13px;color:rgba(246,226,179,0.7);margin-top:-8px}
.clear-word-row{display:flex;gap:6px;align-items:center;background:linear-gradient(145deg,#3A2214,#2A1608);border:2px solid var(--capy-light);border-radius:16px;padding:14px 20px;justify-content:center;box-shadow:0 0 20px rgba(200,121,74,0.35)}
.clear-word-row .wc{font-size:30px;font-weight:900;color:#fff;text-shadow:0 0 12px rgba(232,166,107,0.8)}
.clear-word-row .sp{width:8px}
.clear-text{font-size:14px;color:rgba(246,226,179,0.85);line-height:1.85;font-weight:500}
.clear-next-btn{background:linear-gradient(180deg,var(--capy-light),var(--capy));color:#fff;border:none;border-radius:16px;padding:14px 36px;font-size:16px;font-weight:900;cursor:pointer;box-shadow:0 4px 0 #5A3418,0 8px 20px rgba(200,121,74,0.4);transition:all 0.15s;font-family:'Noto Sans KR',sans-serif}
.clear-next-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #5A3418}
</style>
</head>

<script>
const PINS = [{"id": "p1", "x": 70.2, "y": 26.2, "label": "작은발톱수달", "ans": "생"}, {"id": "p2", "x": 89.4, "y": 42.1, "label": "카피바라", "ans": "한"}, {"id": "p3", "x": 23.0, "y": 52.6, "label": "미어캣", "ans": "명"}, {"id": "p4", "x": 28.3, "y": 69.2, "label": "사막여우", "ans": "소"}, {"id": "p5", "x": 43.9, "y": 70.0, "label": "킨카주", "ans": "중"}];
const ANSWER = ["소","중","한","생","명"];  // 정답 순서

(function(){
  const c=document.getElementById('fireflies');
  for(let i=0;i<16;i++){
    const f=document.createElement('div');f.className='firefly';
    f.style.cssText='left:'+(Math.random()*100)+'%;top:'+(Math.random()*100)+'%;width:'+(2+Math.random()*3)+'px;height:'+(2+Math.random()*3)+'px;animation-duration:'+(6+Math.random()*10)+'s;animation-delay:'+(Math.random()*8)+'s';
    c.appendChild(f);
  }
})();

const mapWrap=document.getElementById('mapWrap');
const slots=[].slice.call(document.querySelectorAll('.slot'));
const mainBtn=document.getElementById('mainBtn');
const modalBg=document.getElementById('modalBg');
const modalDisplay=document.getElementById('modalDisplay');
const modalTitle=document.getElementById('modalTitle');
const okBtn=document.getElementById('okBtn');

let currentPinEl=null, typed="", solved=false;
const entries={};  // pinId -> 입력글자

// 핀 생성
PINS.forEach(function(p){
  const pin=document.createElement('div');
  pin.className='pin pulse';
  pin.style.left=p.x+'%';
  pin.style.top=p.y+'%';
  pin.dataset.id=p.id;
  pin.innerHTML='<svg viewBox="0 0 34 46"><path class="pin-body" d="M17 1 C8 1 1 8 1 17 C1 28 17 45 17 45 C17 45 33 28 33 17 C33 8 26 1 17 1 Z"/></svg><span class="pin-char"></span>';
  pin.onclick=function(){ openModal(p, pin); };
  mapWrap.appendChild(pin);
});

// 키패드: 정답 글자 + 헷갈림 방지용 글자 몇 개 섞기
const KEYCHARS=["함","생","랑","중","삶","명","바","소","참","한"];
const kbd=document.getElementById('kbd');
function buildKbd(){
  kbd.innerHTML="";
  let row;
  KEYCHARS.forEach(function(ch,i){
    if(i%5===0){ row=document.createElement('div'); row.className='kbd-row'; kbd.appendChild(row); }
    const k=document.createElement('button');
    k.className='key'; k.textContent=ch;
    k.onclick=function(){ typed=ch; modalDisplay.textContent=ch; modalDisplay.classList.remove('empty'); okBtn.disabled=false; };
    row.appendChild(k);
  });
}
buildKbd();

function openModal(p, pinEl){
  currentPinEl=pinEl;
  currentPinEl._pin=p;
  typed= entries[p.id] || "";
  modalTitle.textContent=p.label+' 자리';
  if(typed){ modalDisplay.textContent=typed; modalDisplay.classList.remove('empty'); okBtn.disabled=false; }
  else { modalDisplay.textContent="_"; modalDisplay.classList.add('empty'); okBtn.disabled=true; }
  modalBg.classList.add('show');
}
function closeModal(){ modalBg.classList.remove('show'); }

function confirmInput(){
  if(!typed) return;
  const p=currentPinEl._pin;
  entries[p.id]=typed;
  currentPinEl.classList.add('filled');
  currentPinEl.classList.remove('pulse');
  currentPinEl.querySelector('.pin-char').textContent=typed;
  closeModal();
  refreshProgress();
}

function refreshProgress(){
  const count=Object.keys(entries).length;
  if(count<5){
    mainBtn.disabled=true;
    mainBtn.textContent='지도의 핀을 눌러 글자를 채워줘 ('+count+'/5)';
  } else {
    mainBtn.disabled=false;
    mainBtn.textContent='✨ 글자 순서 맞추기!';
    mainBtn.onclick=autoArrange;
  }
}

// 정답 채점 → 각 핀이 맞으면 통과, 하나라도 틀리면 다시 안내
function autoArrange(){
  if(solved) return;

  // 모든 핀이 자기 자리 정답과 일치하는지 확인
  let allCorrect = PINS.every(function(p){ return entries[p.id] === p.ans; });

  if(!allCorrect){
    // 틀림 → 흔들고 메시지만 표시 (어디가 틀렸는지는 안 알려줌)
    mainBtn.classList.add('shake');
    mainBtn.textContent='❌ 다시 찾아보세요!';
    setTimeout(function(){
      mainBtn.classList.remove('shake');
      mainBtn.textContent='✨ 글자 순서 맞추기!';
    }, 1400);
    return;
  }

  // 다 맞음 → "짠" 하고 정답 순서로 채우기
  solved=true;
  mainBtn.disabled=true;
  mainBtn.classList.add('done');
  mainBtn.textContent='순서를 맞추는 중...';
  ANSWER.forEach(function(ch,i){
    setTimeout(function(){
      slots[i].textContent=ch;
      slots[i].classList.add('filled');
      if(i===ANSWER.length-1){
        setTimeout(showClear, 700);
      }
    }, 350*(i+1));
  });
}

function showClear(){
  const cw=document.getElementById('clearWord');
  cw.innerHTML="";
  ANSWER.forEach(function(ch,i){
    const s=document.createElement('span'); s.className='wc'; s.textContent=ch; cw.appendChild(s);
    if(i===2){ const sp=document.createElement('span'); sp.className='sp'; cw.appendChild(sp); }
  });
  document.getElementById('clearScreen').classList.add('show');
}
</script>
